<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>AI in International Sales at Kärcher</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: 'Barlow', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      background: #f4f4f4;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .top-bar {
      background: #1a1a1a;
      border-bottom: 4px solid #ffde00;
      padding: 14px 24px;
      color: #f4f4f4;
      font-family: 'Barlow Condensed', 'Arial Narrow', sans-serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
    }
    .notice {
      background: #ffffff;
      border-top: 6px solid #ffde00;
      max-width: 640px;
      padding: 40px 36px;
      box-shadow: 0 1px 4px rgba(26, 26, 26, 0.08);
    }
    .notice__eyebrow {
      font-family: 'Barlow Condensed', 'Arial Narrow', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(26, 26, 26, 0.55);
      margin: 0 0 10px;
    }
    h1 {
      font-family: 'Barlow Condensed', 'Arial Narrow', sans-serif;
      font-size: 34px;
      font-weight: 700;
      margin: 0 0 16px;
      line-height: 1.15;
    }
    p { font-size: 17px; line-height: 1.6; margin: 0 0 14px; }
    p:last-child { margin-bottom: 0; }
  </style>
</head>
<body>
  <div class="top-bar">AI in International Sales at Kärcher</div>
  <main>
    <div class="notice">
      <p class="notice__eyebrow">Update in progress</p>
      <h1>Thank you for your feedback during the trainer session!</h1>
      <p>We are building a new, much simpler version of this training. The previous content has been taken offline while we rework it.</p>
      <p><strong>The updated content will be published here soon.</strong></p>
    </div>
  </main>
</body>
</html>
